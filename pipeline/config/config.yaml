llm:
  base_url: "${LLM_BASE_URL}"
  api_key: "${LLM_API_KEY}"
  model: "mimo-v2.5"
  max_tokens: 128000
  temperature: 1

ocr:
  base_url: "${OCR_BASE_URL}"
  api_key: "${OCR_API_KEY}"
  model: "mimo-v2.5"
  dpi: 200
  max_tokens: 128000

cost_limits:
  max_cost_per_run: 5.00
  max_tokens_per_entry: 8000
  max_entries_per_run: 500

database:
  url: "postgresql+asyncpg://hismap:hismap@localhost:5432/hismap"

